<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda de Tarjetas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
}

/* HERO */

.hero{
height:380px;
background:url("fondo.jpg") center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.slider{
position:relative;
width:90%;
max-width:1000px;
height:240px;
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.slide.active{
opacity:1;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.card{
background:white;
width:220px;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
cursor:pointer;
}

.card h3{
margin:10px;
}

.card p{
margin:5px;
font-weight:bold;
}

.card button{
margin:10px;
padding:8px 16px;
border-radius:20px;
border:1px solid #25D366;
background:white;
color:#25D366;
cursor:pointer;
}

.card button:hover{
background:#25D366;
color:white;
}

/* FORMULARIO */

.formulario{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.formulario input,
.formulario select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* CARRITO */

.botonCarrito{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
border:none;
padding:15px 20px;
border-radius:40px;
cursor:pointer;
}

.contador{
background:red;
color:white;
border-radius:50%;
padding:4px 8px;
margin-left:5px;
}

.carritoPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.3);
padding:20px;
transition:0.4s;
overflow:auto;
}

.carritoPanel.activo{
right:0;
}

/* ADMIN PANEL */

.admin{
background:white;
max-width:600px;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.dropzone{
border:2px dashed #aaa;
padding:30px;
text-align:center;
margin-top:10px;
cursor:pointer;
}

/* MODAL IMAGEN */

.modal{
display:none;
position:fixed;
z-index:10;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.modal img{
max-width:85%;
max-height:85%;
}

</style>
</head>

<body>

<div class="hero">

<div class="slider">
<img src="slide1.jpg" class="slide active">
<img src="slide2.jpg" class="slide">
<img src="slide3.jpg" class="slide">
</div>

</div>

<div class="container" id="productos"></div>

<div class="formulario">

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">

<label>Fecha de evento</label>
<input type="date" id="fecha">

<select id="entrega">
<option value="">Forma de entrega</option>
<option value="Retiro">Retiro</option>
<option value="Envio">Envío</option>
</select>

<input type="text" id="direccion" placeholder="Dirección">

</div>

<button class="botonCarrito" onclick="abrirCarrito()">
🛒 Carrito <span class="contador" id="contador">0</span>
</button>

<div class="carritoPanel" id="carrito">

<h2>Carrito</h2>

<ul id="lista"></ul>

<button onclick="enviarWhats()">Enviar pedido</button>

</div>

<!-- PANEL ADMIN -->

<div class="admin">

<h2>Panel administrador</h2>

<input id="prodNombre" placeholder="Nombre producto">
<input id="prodPrecio" placeholder="Precio">

<div class="dropzone" id="dropzone">
Arrastra la imagen aquí
</div>

<button onclick="guardarProducto()">Agregar producto</button>

</div>

<div class="modal" id="modal" onclick="cerrarImagen()">
<img id="imgGrande">
</div>

<script>

/* SLIDER */

let slides=document.querySelectorAll(".slide")
let index=0

setInterval(()=>{
slides[index].classList.remove("active")
index++
if(index>=slides.length) index=0
slides[index].classList.add("active")
},4000)

/* PRODUCTOS */

let productos=JSON.parse(localStorage.getItem("productos"))||[]
let carrito=[]
let imagenActual=""

/* MOSTRAR PRODUCTOS */

function mostrarProductos(){

let cont=document.getElementById("productos")
cont.innerHTML=""

productos.forEach((p,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">

<h3>${p.nombre}</h3>

<p>$${p.precio}</p>

<button onclick="agregar('${p.nombre} - $${p.precio}')">Agregar</button>

</div>

`

})

}

mostrarProductos()

/* DRAG IMAGEN */

let dropzone=document.getElementById("dropzone")

dropzone.addEventListener("dragover",e=>{
e.preventDefault()
})

dropzone.addEventListener("drop",e=>{

e.preventDefault()

let file=e.dataTransfer.files[0]

let reader=new FileReader()

reader.onload=function(evt){

imagenActual=evt.target.result
dropzone.innerHTML="<img src='"+imagenActual+"' width='120'>"

}

reader.readAsDataURL(file)

})

/* GUARDAR PRODUCTO */

function guardarProducto(){

let nombre=document.getElementById("prodNombre").value
let precio=document.getElementById("prodPrecio").value

let prod={
nombre:nombre,
precio:precio,
imagen:imagenActual
}

productos.push(prod)

localStorage.setItem("productos",JSON.stringify(productos))

mostrarProductos()

}

/* CARRITO */

function agregar(prod){

carrito.push(prod)

let lista=document.getElementById("lista")

lista.innerHTML=""

carrito.forEach(p=>{
lista.innerHTML+="<li>"+p+"</li>"
})

document.getElementById("contador").innerText=carrito.length

}

function abrirCarrito(){
document.getElementById("carrito").classList.add("activo")
}

/* WHATSAPP */

function enviarWhats(){

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value

let texto="Cliente: "+nombre+" "+apellido+"\n"
texto+="Fecha evento: "+fecha+"\n\n"
texto+="Productos:\n"

carrito.forEach(p=>{
texto+=p+"\n"
})

let url="https://wa.me/5493815441312?text="+encodeURIComponent(texto)

window.open(url)

}

/* ZOOM IMAGEN */

function verImagen(src){

document.getElementById("modal").style.display="flex"
document.getElementById("imgGrande").src=src

}

function cerrarImagen(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
