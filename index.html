<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Tarjetas</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* PORTADA */

.portada{
height:350px;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
}

/* PRODUCTOS */

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.producto img{
width:100%;
border-radius:8px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

/* FORMULARIO */

.datosCliente{
text-align:center;
padding:30px;
background:white;
margin:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.datosCliente input,
.datosCliente select{

padding:10px;
margin:6px;
font-size:15px;
border-radius:5px;
border:1px solid #ccc;
width:200px;

}

/* BOTON CARRITO */

#botonCarrito{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
border:none;
padding:15px 20px;
border-radius:50px;
font-size:18px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

#contador{
background:red;
color:white;
border-radius:50%;
padding:4px 8px;
font-size:12px;
margin-left:5px;
}

/* PANEL CARRITO */

#carrito{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
overflow:auto;
transition:0.3s;
}

.eliminar{
background:red;
margin-left:10px;
}

</style>

</head>

<body>

<div class="portada"></div>

<div class="container" id="productos"></div>

<!-- FORMULARIO DE CLIENTE -->

<div class="datosCliente">

<h2>Datos para el pedido</h2>

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">

<br>

<label>Fecha de evento</label>
<br>
<input type="date" id="fechaEvento">

<br>

<select id="entrega" onchange="mostrarDireccion()">
<option value="">Forma de entrega</option>
<option value="Retiro en local">Retiro en local</option>
<option value="Envío a domicilio">Envío a domicilio</option>
</select>

<div id="direccionBox" style="display:none">

<input type="text" id="direccion" placeholder="Dirección de envío">

</div>

</div>

<!-- BOTON CARRITO -->

<button id="botonCarrito" onclick="toggleCarrito()">

🛒 Carrito <span id="contador">0</span>

</button>

<!-- PANEL CARRITO -->

<div id="carrito">

<h2>Carrito</h2>

<ul id="listaCarrito"></ul>

<button onclick="enviarPedido()">Enviar pedido</button>

</div>

<script>

const telefono="5493815441312"

let carrito=[]

const productos=[

{nombre:"Tarjeta Globos",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Torta",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Infantil",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Flores",imagen:"https://via.placeholder.com/200"},
{nombre:"Tarjeta Cumple Feliz",imagen:"https://via.placeholder.com/200"}

]

function mostrarProductos(lista){

const contenedor=document.getElementById("productos")

contenedor.innerHTML=""

lista.forEach((p,i)=>{

contenedor.innerHTML+=`

<div class="producto">

<img src="${p.imagen}">

<h3>${p.nombre}</h3>

<input type="number" id="cant${i}" value="1" min="1">

<br>

<button onclick="agregar(${i})">Agregar</button>

</div>

`

})

}

mostrarProductos(productos)

function agregar(i){

let cantidad=document.getElementById("cant"+i).value

carrito.push({

nombre:productos[i].nombre,
cantidad:cantidad

})

actualizarCarrito()

}

function actualizarCarrito(){

let lista=document.getElementById("listaCarrito")

lista.innerHTML=""

let total=0

carrito.forEach((p,i)=>{

total+=parseInt(p.cantidad)

lista.innerHTML+=`

<li>${p.nombre} x${p.cantidad}

<button class="eliminar" onclick="eliminar(${i})">X</button>

</li>

`

})

document.getElementById("contador").innerText=total

}

function eliminar(i){

carrito.splice(i,1)

actualizarCarrito()

}

let abierto=false

function toggleCarrito(){

let panel=document.getElementById("carrito")

if(abierto){

panel.style.right="-320px"
abierto=false

}else{

panel.style.right="0"
abierto=true

}

}

function mostrarDireccion(){

let entrega=document.getElementById("entrega").value

if(entrega==="Envío a domicilio"){

document.getElementById("direccionBox").style.display="block"

}else{

document.getElementById("direccionBox").style.display="none"

}

}

function enviarPedido(){

let nombre=document.getElementById("nombre").value.trim()
let apellido=document.getElementById("apellido").value.trim()
let fecha=document.getElementById("fechaEvento").value
let entrega=document.getElementById("entrega").value
let direccion=document.getElementById("direccion").value

if(nombre==="" || apellido==="" || fecha==="" || entrega===""){

alert("Complete los datos del cliente")

return

}

if(entrega==="Envío a domicilio" && direccion===""){

alert("Ingrese la dirección")

return

}

if(carrito.length===0){

alert("El carrito está vacío")

return

}

let mensaje="PEDIDO TARJETAS%0A"
mensaje+="--------------------%0A"

mensaje+=`Cliente: ${nombre} ${apellido}%0A`
mensaje+=`Fecha evento: ${fecha}%0A`
mensaje+=`Entrega: ${entrega}%0A`

if(entrega==="Envío a domicilio"){
mensaje+=`Dirección: ${direccion}%0A`
}

mensaje+="%0AProductos:%0A"

carrito.forEach(p=>{

mensaje+=`• ${p.nombre} x${p.cantidad}%0A`

})

let url=`https://wa.me/${telefono}?text=${mensaje}`

window.open(url)

}

</script>

</body>

</html>
