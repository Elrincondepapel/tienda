<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Tarjetas</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* HERO */

.hero{
height:350px;
background:url("fondo.jpg") center/cover;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.card{
width:220px;
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
text-align:center;
overflow:hidden;
}

.card img{
width:100%;
cursor:pointer;
}

.card h3{
margin:10px;
font-size:16px;
}

.card p{
font-weight:bold;
}

.card button{
margin:10px;
padding:8px 16px;
border-radius:20px;
border:1px solid #25D366;
background:white;
color:#25D366;
cursor:pointer;
}

.card button:hover{
background:#25D366;
color:white;
}

/* FORMULARIO */

.formulario{
max-width:500px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.formulario input,
.formulario select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* BOTON CARRITO */

.botonCarrito{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
border:none;
padding:15px 20px;
border-radius:40px;
cursor:pointer;
font-size:16px;
}

.contador{
background:red;
color:white;
border-radius:50%;
padding:4px 8px;
margin-left:5px;
font-size:12px;
}

/* CARRITO OCULTO */

.carritoPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 15px rgba(0,0,0,0.3);
padding:20px;
transition:0.4s;
overflow:auto;
}

.carritoPanel.activo{
right:0;
}

.cerrar{
font-size:20px;
cursor:pointer;
float:right;
}

/* MODAL IMAGEN */

.modal{
display:none;
position:fixed;
z-index:10;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<div class="hero"></div>

<div class="container" id="productos"></div>

<div class="formulario">

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">

<label>Fecha de evento</label>
<input type="date" id="fecha">

<select id="entrega">
<option value="">Forma de entrega</option>
<option value="Retiro">Retiro</option>
<option value="Envio">Envío</option>
</select>

<input id="direccion" placeholder="Dirección">

</div>

<button class="botonCarrito" onclick="abrirCarrito()">
🛒 Carrito <span class="contador" id="contador">0</span>
</button>

<div class="carritoPanel" id="carrito">

<span class="cerrar" onclick="cerrarCarrito()">✖</span>

<h2>Carrito</h2>

<ul id="lista"></ul>

<button onclick="enviarWhats()">Enviar pedido</button>

</div>

<div class="modal" id="modal" onclick="cerrarImagen()">
<img id="imgGrande">
</div>

<script>

/* PRODUCTOS */

let carrito=[]
let productos=[]

fetch("productos.json")

.then(res=>res.json())

.then(data=>{

productos=data

mostrar()

})

function mostrar(){

let cont=document.getElementById("productos")

productos.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">

<h3>${p.nombre}</h3>

<p>$${p.precio}</p>

<button onclick="agregar('${p.nombre} - $${p.precio}')">Agregar</button>

</div>

`

})

}

/* CARRITO */

function agregar(prod){

carrito.push(prod)

actualizar()

}

function actualizar(){

let lista=document.getElementById("lista")

lista.innerHTML=""

carrito.forEach(p=>{

lista.innerHTML+="<li>"+p+"</li>"

})

document.getElementById("contador").innerText=carrito.length

}

function abrirCarrito(){

document.getElementById("carrito").classList.add("activo")

}

function cerrarCarrito(){

document.getElementById("carrito").classList.remove("activo")

}

/* WHATSAPP */

function enviarWhats(){

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let entrega=document.getElementById("entrega").value
let direccion=document.getElementById("direccion").value

let texto="Cliente: "+nombre+" "+apellido+"\n"
texto+="Fecha evento: "+fecha+"\n"
texto+="Entrega: "+entrega+"\n"
texto+="Direccion: "+direccion+"\n\n"

texto+="Productos:\n"

carrito.forEach(p=>{
texto+=p+"\n"
})

let url="https://wa.me/5493815441312?text="+encodeURIComponent(texto)

window.open(url)

}

/* ZOOM IMAGEN */

function verImagen(src){

document.getElementById("modal").style.display="flex"
document.getElementById("imgGrande").src=src

}

function cerrarImagen(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
