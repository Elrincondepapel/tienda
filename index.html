<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda de Tarjetas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HERO */

.hero{
height:380px;
background:url("fondo.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

/* SLIDER */

.slider{
position:relative;
width:90%;
max-width:1000px;
height:240px;
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.slide.active{
opacity:1;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.card{
background:white;
width:220px;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
cursor:pointer;
}

.card h3{
margin:10px;
font-size:16px;
}

.card button{
margin:10px;
padding:8px 16px;
border-radius:25px;
border:1px solid #25D366;
background:white;
color:#25D366;
cursor:pointer;
transition:0.3s;
}

.card button:hover{
background:#25D366;
color:white;
}

/* FORMULARIO */

.formulario{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.formulario input,
.formulario select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* BOTON CARRITO */

.botonCarrito{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
border:none;
padding:15px 20px;
border-radius:40px;
cursor:pointer;
font-size:16px;
}

.contador{
background:red;
color:white;
border-radius:50%;
padding:4px 8px;
margin-left:5px;
font-size:12px;
}

/* PANEL CARRITO */

.carritoPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.3);
padding:20px;
transition:0.4s;
overflow:auto;
}

.carritoPanel.activo{
right:0;
}

.cerrar{
font-size:20px;
cursor:pointer;
float:right;
}

.eliminar{
color:red;
cursor:pointer;
margin-left:10px;
}

/* RESUMEN */

.resumen{
background:white;
max-width:600px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
}

.resumen button{
background:#25D366;
color:white;
border:none;
padding:12px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* MODAL IMAGEN */

.modal{
display:none;
position:fixed;
z-index:10;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.modal img{
max-width:85%;
max-height:85%;
}

</style>
</head>

<body>

<div class="hero">

<div class="slider">

<img src="slide1.jpg" class="slide active">
<img src="slide2.jpg" class="slide">
<img src="slide3.jpg" class="slide">

</div>

</div>

<div class="container" id="productos"></div>

<div class="formulario">

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">

<label>Fecha de evento</label>
<input type="date" id="fecha">

<select id="entrega" onchange="cambiarDireccion()">
<option value="">Forma de entrega</option>
<option value="Retiro">Retiro</option>
<option value="Envio">Envío</option>
</select>

<input type="text" id="direccion" placeholder="Dirección">

</div>

<button class="botonCarrito" onclick="abrirCarrito()">
🛒 Carrito <span class="contador" id="contador">0</span>
</button>

<div class="carritoPanel" id="carrito">

<span class="cerrar" onclick="cerrarCarrito()">✖</span>

<h2>Carrito</h2>

<ul id="lista"></ul>

<button onclick="verResumen()">Ver resumen</button>

</div>

<div class="resumen" id="resumen">

<h2>Resumen del pedido</h2>

<pre id="datos"></pre>

<button onclick="enviarWhats()">Enviar pedido</button>

</div>

<div class="modal" id="modal" onclick="cerrarImagen()">
<img id="imgGrande">
</div>

<script>

/* SLIDER */

let slides=document.querySelectorAll(".slide")
let index=0

setInterval(()=>{

slides[index].classList.remove("active")

index++
if(index>=slides.length) index=0

slides[index].classList.add("active")

},4000)

/* PRODUCTOS */

let carrito=[]

fetch("productos.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let workbook=XLSX.read(data)
let hoja=workbook.Sheets[workbook.SheetNames[0]]
let productos=XLSX.utils.sheet_to_json(hoja)

let cont=document.getElementById("productos")

productos.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">

<h3>${p.nombre}</h3>

<button onclick="agregar('${p.nombre}')">Agregar</button>

</div>

`

})

})

function agregar(prod){

carrito.push(prod)

actualizarCarrito()

}

function actualizarCarrito(){

let lista=document.getElementById("lista")

lista.innerHTML=""

carrito.forEach((p,i)=>{

lista.innerHTML+=`
<li>${p}
<span class="eliminar" onclick="eliminar(${i})">✖</span>
</li>
`

})

document.getElementById("contador").innerText=carrito.length

}

function eliminar(i){

carrito.splice(i,1)

actualizarCarrito()

}

function abrirCarrito(){
document.getElementById("carrito").classList.add("activo")
}

function cerrarCarrito(){
document.getElementById("carrito").classList.remove("activo")
}

function cambiarDireccion(){

let tipo=document.getElementById("entrega").value
let dir=document.getElementById("direccion")

if(tipo=="Retiro"){
dir.placeholder="Dirección donde retira"
}

if(tipo=="Envio"){
dir.placeholder="Dirección de entrega"
}

}

function verImagen(src){

document.getElementById("modal").style.display="flex"
document.getElementById("imgGrande").src=src

}

function cerrarImagen(){
document.getElementById("modal").style.display="none"
}

function verResumen(){

let nombre=document.getElementById("nombre").value
let apellido=document.getElementById("apellido").value
let fecha=document.getElementById("fecha").value
let entrega=document.getElementById("entrega").value
let direccion=document.getElementById("direccion").value

let productos=carrito.join(", ")

let texto=`
Cliente: ${nombre} ${apellido}
Fecha evento: ${fecha}
Entrega: ${entrega}
Dirección: ${direccion}

Productos:
${productos}
`

document.getElementById("datos").innerText=texto

document.getElementById("resumen").style.display="block"

cerrarCarrito()

}

function enviarWhats(){

let datos=document.getElementById("datos").innerText

let url="https://wa.me/5493815441312?text="+encodeURIComponent(datos)

window.open(url)

}

</script>

</body>
</html>
